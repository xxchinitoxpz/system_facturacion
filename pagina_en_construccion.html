<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página en Construcción - OdinDeveloper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            z-index: 10;
            position: relative;
        }

        .construction-icon {
            font-size: 8rem;
            margin-bottom: 2rem;
            animation: bounce 2s infinite;
        }

        .title {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .developer-info {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 2rem;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .developer-name {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #ffd700;
        }

        .developer-tagline {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .progress-bar {
            width: 300px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin: 2rem auto;
            overflow: hidden;
            animation: fadeInUp 1s ease-out 0.9s both;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            border-radius: 3px;
            animation: progress 3s ease-in-out infinite;
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .floating-element {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-element:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .floating-element:nth-child(3) { top: 60%; left: 5%; animation-delay: 2s; }
        .floating-element:nth-child(4) { top: 80%; right: 10%; animation-delay: 3s; }
        .floating-element:nth-child(5) { top: 40%; left: 80%; animation-delay: 4s; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-30px);
            }
            60% {
                transform: translateY(-15px);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
            .developer-name {
                font-size: 1.5rem;
            }
            .construction-icon {
                font-size: 6rem;
            }
            .progress-bar {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-element">🔨</div>
        <div class="floating-element">⚙️</div>
        <div class="floating-element">💻</div>
        <div class="floating-element">🚀</div>
        <div class="floating-element">⚡</div>
    </div>

    <div class="container">
        <div class="construction-icon">🏗️</div>
        <h1 class="title">Página en Construcción</h1>
        <p class="subtitle">Estamos trabajando para traerte algo increíble</p>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="developer-info">
            <div class="developer-name">OdinDeveloper</div>
            <div class="developer-tagline">Desarrollando el futuro, línea por línea</div>
        </div>
    </div>

    <script>
        // Efecto de partículas flotantes
        function createParticle() {
            const particle = document.createElement('div');
            particle.innerHTML = ['🔨', '⚙️', '💻', '🚀', '⚡'][Math.floor(Math.random() * 5)];
            particle.style.position = 'absolute';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.fontSize = (Math.random() * 2 + 1) + 'rem';
            particle.style.opacity = '0.1';
            particle.style.pointerEvents = 'none';
            particle.style.animation = `float ${Math.random() * 4 + 3}s ease-in-out infinite`;
            particle.style.animationDelay = Math.random() * 2 + 's';
            
            document.querySelector('.floating-elements').appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 8000);
        }

        // Crear partículas cada 2 segundos
        setInterval(createParticle, 2000);

        // Efecto de escritura para el título
        function typeWriter(element, text, speed = 100) {
            let i = 0;
            element.innerHTML = '';
            
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        // Aplicar efecto de escritura cuando la página cargue
        window.addEventListener('load', () => {
            const title = document.querySelector('.title');
            const originalText = title.textContent;
            setTimeout(() => {
                typeWriter(title, originalText, 150);
            }, 1000);
        });

        // Efecto de cursor parpadeante
        function addBlinkingCursor() {
            const title = document.querySelector('.title');
            title.style.borderRight = '3px solid white';
            title.style.animation = 'blink 1s infinite';
        }

        // Agregar estilos para el cursor parpadeante
        const style = document.createElement('style');
        style.textContent = `
            @keyframes blink {
                0%, 50% { border-right-color: white; }
                51%, 100% { border-right-color: transparent; }
            }
        `;
        document.head.appendChild(style);

        // Aplicar cursor después de la animación de escritura
        setTimeout(addBlinkingCursor, 5000);
    </script>
</body>
</html>
